<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title data-i18n="settingsTitle">YouTube AI Summary — Settings</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: #e0e0e0;
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}
.container {
  width: 100%;
  max-width: 520px;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
}
h1 span { font-size: 26px; }
.card {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.card h3 {
  font-weight: 600;
  color: #b0b0c0;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 11px;
}
.ai-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.ai-options label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid #2a2a4a;
  background: #16213e;
  transition: all 0.15s;
  font-weight: 500;
  color: #c0c0d0;
}
.ai-options label:hover { background: #1a2744; border-color: #3a3a5a; }
.ai-options input[type="radio"] { display: none; }
.ai-options input[type="radio"]:checked + label {
  border-color: #10a37f;
  background: #0f3d30;
  color: #fff;
}
.ai-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
textarea {
  width: 100%;
  height: 200px;
  background: #16213e;
  color: #e0e0e0;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 12px 14px;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 12.5px;
  resize: vertical;
  line-height: 1.6;
}
textarea:focus { outline: none; border-color: #10a37f; }
.template-list {
  list-style: none;
  margin-bottom: 12px;
}
.template-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid #2a2a4a;
  background: #16213e;
  transition: all 0.15s;
  font-weight: 500;
  color: #c0c0d0;
  margin-bottom: 6px;
}
.template-item:hover { background: #1a2744; border-color: #3a3a5a; }
.template-item.active {
  border-color: #10a37f;
  background: #0f3d30;
  color: #fff;
}
.template-item .template-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.template-item .template-delete {
  background: none;
  border: none;
  color: #606080;
  font-size: 16px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.15s;
}
.template-item .template-delete:hover { color: #e05050; }
#btn-add-template {
  background: #2a2a4a;
  color: #b0b0c0;
  border: 1px dashed #3a3a5a;
  border-radius: 10px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  width: 100%;
  transition: all 0.15s;
  margin-bottom: 14px;
}
#btn-add-template:hover { background: #3a3a5a; color: #fff; }
#template-name-input {
  width: 100%;
  background: #16213e;
  color: #e0e0e0;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 10px;
}
#template-name-input:focus { outline: none; border-color: #10a37f; }
.hint {
  font-size: 12px;
  color: #606080;
  margin-top: 8px;
  line-height: 1.5;
}
.hint code {
  background: #16213e;
  padding: 1px 5px;
  border-radius: 4px;
  color: #10a37f;
}
.actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
button {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
#btn-save {
  background: linear-gradient(135deg, #10a37f, #1a7f64);
  color: #fff;
  flex: 1;
}
#btn-save:hover { background: linear-gradient(135deg, #1a7f64, #10a37f); }
#btn-reset {
  background: #2a2a4a;
  color: #b0b0c0;
}
#btn-reset:hover { background: #3a3a5a; color: #fff; }
#status {
  text-align: center;
  margin-top: 14px;
  font-size: 13px;
  min-height: 20px;
}
.status-ok { color: #10a37f; }
.status-err { color: #e05050; }
.toggle-label {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-weight: 400;
  color: #c0c0d0;
  line-height: 1.4;
}
.toggle-label code {
  background: #16213e;
  padding: 1px 5px;
  border-radius: 4px;
  color: #10a37f;
}
.toggle-label input[type="checkbox"] { display: none; }
.toggle-switch {
  width: 38px;
  height: 22px;
  background: #2a2a4a;
  border-radius: 11px;
  position: relative;
  flex-shrink: 0;
  transition: background 0.2s;
}
.toggle-switch::after {
  content: "";
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  background: #606080;
  border-radius: 50%;
  transition: all 0.2s;
}
.toggle-label input:checked + .toggle-switch {
  background: #10a37f;
}
.toggle-label input:checked + .toggle-switch::after {
  left: 19px;
  background: #fff;
}
</style>
</head>
<body>
  <div class="container">
    <h1><span>▶</span> <span data-i18n="settingsTitle"></span></h1>

    <div class="card">
      <h3 data-i18n="settingsAiService"></h3>
      <div class="ai-options">
        <input type="radio" name="ai" id="ai-chatgpt" value="chatgpt">
        <label for="ai-chatgpt"><span class="ai-dot" style="background:#10a37f"></span>ChatGPT</label>

        <input type="radio" name="ai" id="ai-claude" value="claude">
        <label for="ai-claude"><span class="ai-dot" style="background:#d97706"></span>Claude</label>

        <input type="radio" name="ai" id="ai-gemini" value="gemini">
        <label for="ai-gemini"><span class="ai-dot" style="background:#4285f4"></span>Gemini</label>

        <input type="radio" name="ai" id="ai-grok" value="grok">
        <label for="ai-grok"><span class="ai-dot" style="background:#e0e0e0"></span>Grok</label>
      </div>
    </div>

    <div class="card">
      <h3 data-i18n="settingsOptions"></h3>
      <label class="toggle-label">
        <input type="checkbox" id="close-tab">
        <span class="toggle-switch"></span>
        <span data-i18n="settingsCloseTab"></span>
      </label>
      <div style="height: 10px;"></div>
      <label class="toggle-label">
        <input type="checkbox" id="timestamps">
        <span class="toggle-switch"></span>
        <span data-i18n-html="settingsTimestamps"></span>
      </label>
    </div>

    <div class="card">
      <h3 data-i18n="settingsPromptTemplates"></h3>
      <ul id="template-list" class="template-list"></ul>
      <button id="btn-add-template" data-i18n="templateAdd"></button>
      <input type="text" id="template-name-input" data-i18n-placeholder="templateNamePlaceholder">
      <textarea id="prompt-template"></textarea>
      <div class="hint" data-i18n-html="settingsPlaceholders"></div>
    </div>

    <div class="actions">
      <button id="btn-reset" data-i18n="settingsReset"></button>
    </div>
    <div id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
