<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: #e0e0e0;
  background: #1a1a2e;
  min-width: 200px;
}
.template-item {
  display: block;
  width: 100%;
  padding: 12px 16px;
  border: none;
  background: none;
  color: #e0e0e0;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.1s;
}
.template-item:hover {
  background: #2a2a4a;
}
.template-item:active {
  background: #10a37f;
}
.status {
  padding: 14px 16px;
  text-align: center;
  font-weight: 500;
}
.status.loading { color: #10a37f; }
.status.error { color: #e05050; }
</style>
</head>
<body>
<div id="content"></div>
<script src="popup.js"></script>
</body>
</html>
